<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grid Bot — Performance Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{
  --ink:#0E1116; --slate:#161B22; --line:#232B36; --mute:#7C8794;
  --paper:#E8EAED; --up:#3FB68B; --down:#E5643E; --wire:#5B8DEF;
  --amber:#D9A441; --violet:#9B8DEF;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--paper);font-family:'Archivo',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;padding:0 0 80px}
.wrap{max-width:1080px;margin:0 auto;padding:0 24px}
.mono{font-family:'IBM Plex Mono',monospace}

header{border-bottom:1px solid var(--line);padding:22px 0;margin-bottom:36px}
.masthead{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap}
.brand{font-size:15px;font-weight:700;letter-spacing:.14em;text-transform:uppercase}
.brand span{color:var(--mute);font-weight:500}
.stamp{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mute);
  letter-spacing:.06em;display:flex;align-items:center;gap:8px}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--up);animation:blip 2.4s ease-in-out infinite}
@keyframes blip{0%,100%{opacity:1}50%{opacity:.25}}
@media(prefers-reduced-motion:reduce){.pulse{animation:none}}

/* hero */
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mute);
  letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px}
.hero{display:grid;grid-template-columns:1fr auto;gap:32px;align-items:end;margin-bottom:10px}
.pnlbig{font-family:'IBM Plex Mono',monospace;font-size:clamp(44px,8vw,80px);
  font-weight:600;line-height:.92;letter-spacing:-.03em;font-variant-numeric:tabular-nums;color:var(--up)}
.heroside{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--mute);
  text-align:right;line-height:1.8}
.heroside b{color:var(--paper);font-weight:600}

/* grid chart */
.gcwrap{background:var(--slate);border:1px solid var(--line);border-radius:4px;overflow:hidden}
.gclegend{display:flex;flex-wrap:wrap;gap:16px;padding:12px 16px;border-bottom:1px solid var(--line);
  font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mute);letter-spacing:.04em}
.lg{display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%}
.dash{width:16px;height:0;border-top:1.5px dashed}
.gcbar{display:flex;gap:8px;padding:11px 16px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--line)}
.gchint{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mute);margin-left:auto}

/* split cards */
.split{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);margin:0 0 1px}
.half{background:var(--ink);padding:18px 20px}
.half .k{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mute);
  letter-spacing:.12em;text-transform:uppercase;margin-bottom:9px}
.half .v{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;font-variant-numeric:tabular-nums}
.half .n{font-size:11.5px;color:var(--mute);margin-top:7px;line-height:1.5}
.bework{background:var(--slate);padding:20px 22px;margin-bottom:44px;border-left:2px solid var(--amber)}
.bemain .k{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mute);
  letter-spacing:.06em;margin-bottom:12px}
.betrack{height:3px;background:var(--line);position:relative;border-radius:2px}
.bezone{position:absolute;top:0;bottom:0;background:var(--down);opacity:.55;border-radius:2px}
.beknob{position:absolute;top:50%;width:10px;height:10px;border-radius:50%;background:var(--paper);
  transform:translate(-50%,-50%);box-shadow:0 0 0 3px var(--slate)}
.bemain .n{font-size:12px;color:var(--mute);margin-top:12px;line-height:1.6}
.bemain .n b{color:var(--paper)}
code{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--amber)}

/* exposure bar */
.expo{margin:28px 0 44px}
.expolabels{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;
  font-size:11px;color:var(--mute);margin-bottom:8px;letter-spacing:.05em}
.track{height:3px;background:var(--line);position:relative;border-radius:2px;overflow:hidden}
.fillbar{position:absolute;left:0;top:0;bottom:0;background:var(--amber);border-radius:2px}
.expocap{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mute);
  margin-top:10px;letter-spacing:.04em;line-height:1.7}

section{margin-bottom:52px}
.shead{display:flex;align-items:baseline;justify-content:space-between;gap:16px;
  border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:20px;flex-wrap:wrap}
h2{font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase}
.sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mute);letter-spacing:.04em}

.tabs{display:flex;gap:2px;background:var(--slate);padding:3px;border-radius:6px}
.tab{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.08em;
  color:var(--mute);background:none;border:0;cursor:pointer;padding:6px 13px;border-radius:4px;
  transition:background .15s,color .15s}
.tab:hover{color:var(--paper)}
.tab[aria-selected="true"]{background:var(--line);color:var(--paper)}
.tab:focus-visible{outline:2px solid var(--wire);outline-offset:2px}

.chartbox{position:relative;height:300px}
.histbox{position:relative;height:200px}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:1px;background:var(--line)}
.stat{background:var(--ink);padding:18px 18px 20px}
.stat .k{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mute);
  letter-spacing:.12em;text-transform:uppercase;margin-bottom:9px}
.stat .v{font-family:'IBM Plex Mono',monospace;font-size:21px;font-weight:600;font-variant-numeric:tabular-nums}
.stat .n{font-size:11px;color:var(--mute);margin-top:5px;line-height:1.5}

/* level ladder */
.ladder{display:flex;flex-direction:column;gap:1px;background:var(--line)}
.rung{background:var(--ink);display:grid;grid-template-columns:76px 1fr 128px;
  align-items:center;gap:14px;padding:9px 14px}
.rungp{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
.rungbar{height:20px;background:var(--slate);position:relative;border-radius:2px;overflow:hidden}
.rungfill{position:absolute;left:0;top:0;bottom:0;background:var(--up);opacity:.5}
.rungmeta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mute);text-align:right}

/* epoch cards */
.epochs{display:grid;gap:1px;background:var(--line)}
.epoch{background:var(--ink);padding:18px 20px;display:grid;
  grid-template-columns:1fr repeat(4,minmax(76px,auto));gap:18px;align-items:center}
.epoch.cur{border-left:2px solid var(--wire)}
.epochname{font-size:13px;font-weight:600}
.epochband{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mute);margin-top:4px}
.epochm{text-align:right}
.epochm .k{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mute);
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.epochm .v{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}

/* table */
.tblwrap{overflow-x:auto}
table.tt{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:11.5px;min-width:720px}
table.tt th{color:var(--mute);font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  font-size:9.5px;padding:0 10px 10px;text-align:right;border-bottom:1px solid var(--line)}
table.tt th:first-child,table.tt td:first-child{text-align:left}
table.tt td{padding:9px 10px;text-align:right;border-bottom:1px solid var(--slate);font-variant-numeric:tabular-nums}
table.tt tr:hover td{background:var(--slate)}
.unconf{color:var(--amber)}
.pill{font-size:9px;letter-spacing:.08em;border:1px solid var(--amber);color:var(--amber);
  padding:1px 5px;border-radius:3px;margin-left:6px}

.note{background:var(--slate);border-left:2px solid var(--wire);padding:16px 20px;
  font-size:12.5px;color:var(--mute);line-height:1.7}
.note b{color:var(--paper);font-weight:600}

.loading,.err{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--mute);
  padding:26px 0;letter-spacing:.04em}
.err{color:var(--down)}
.setup{background:var(--slate);padding:22px 24px;border-left:2px solid var(--amber);
  font-size:13px;line-height:1.8;color:var(--mute)}
.setup b{color:var(--paper)}
.setup code{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--amber)}

footer{border-top:1px solid var(--line);padding-top:18px;font-family:'IBM Plex Mono',monospace;
  font-size:11px;color:var(--mute);line-height:1.8;letter-spacing:.03em}

@media(max-width:700px){
  .hero{grid-template-columns:1fr;gap:14px;align-items:start}
  .split{grid-template-columns:1fr}
  .heroside{text-align:left}
  .epoch{grid-template-columns:1fr 1fr;gap:12px}
  .shead{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<header>
  <div class="wrap masthead">
    <div class="brand">GRID BOT <span>/ PERFORMANCE LEDGER</span></div>
    <div class="stamp"><span class="pulse"></span><span id="stamp">loading</span></div>
  </div>
</header>

<div class="wrap">
  <div id="app"><div class="loading">Reading ledger…</div></div>
</div>

<script>
/* ============================================================
   CONFIG — paste the published sheet's ID here
   ============================================================ */
const SHEET_ID = '1DgWsvHJQf0a6g2lXi5U0s4jBEgd0xeSTsk-hQpq1kwo';

const csvUrl = tab =>
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`;

/* ---------- formatting ---------- */
const usd  = n => (n<0?'−$':'$') + Math.abs(n).toFixed(2);
const usd4 = n => '$' + n.toFixed(4);
const px   = n => n.toFixed(4);
const pctS = n => (n>=0?'+':'') + n.toFixed(2) + '%';
const num  = n => n.toLocaleString('en-US',{maximumFractionDigits:1});

function fmtDate(d){
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
         d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
}
function fmtDur(ms){
  const h = ms/3600000;
  if(h < 1)  return Math.round(h*60) + 'm';
  if(h < 48) return h.toFixed(1) + 'h';
  return (h/24).toFixed(1) + 'd';
}

/* ---------- CSV loading ---------- */
async function loadTab(tab){
  const r = await fetch(csvUrl(tab));
  if(!r.ok) throw new Error(`"${tab}" tab returned ${r.status}`);
  const text = await r.text();
  if(text.trim().startsWith('<')) throw new Error(`"${tab}" isn't published to the web`);
  const out = Papa.parse(text, {header:true, skipEmptyLines:true, dynamicTyping:false});
  return out.data.map(row=>{
    const o = {};
    for(const k in row){ o[k.trim().toLowerCase().replace(/\s+/g,'_')] = (row[k]??'').toString().trim(); }
    return o;
  }).filter(o => Object.values(o).some(v=>v!==''));
}

const f  = v => { const n = parseFloat(v); return isNaN(n) ? null : n; };
const dt = v => { const d = new Date(v); return isNaN(d) ? null : d; };
const yes= v => /^(y|yes|true|1)$/i.test((v||'').trim());

/* ============================================================
   GRID CHART — candles from Coinbase, overlay from the sheet
   ============================================================ */
const CB_API = 'https://api.exchange.coinbase.com';
const CB_PAIR = 'XRP-USD';

const GRANS = {
  '3h' :{g:300,   span:3,   mode:'grid',  label:'5-minute candles'},
  '6h' :{g:300,   span:6,   mode:'grid',  label:'5-minute candles'},
  '12h':{g:900,   span:12,  mode:'grid',  label:'15-minute candles'},
  '24h':{g:1800,  span:24,  mode:'grid',  label:'30-minute candles'},
  'Full':{g:21600,span:null, mode:'grid', label:'6-hour candles'},
  'P24h':{g:1800, span:24,  mode:'price', label:'30-minute candles'},
  'P1W':{g:3600,  span:168, mode:'price', label:'hourly candles'},
  'P1M':{g:21600, span:720, mode:'price', label:'6-hour candles'}
};

let gridState = {range:'Full', mode:'grid', candles:null, gran:null, zoom:null, drag:null};
let GD = {trips:[], positions:[], epochs:[], openBuys:[]};

async function fetchCandles(gran){
  const raw = await (await fetch(`${CB_API}/products/${CB_PAIR}/candles?granularity=${gran}`)).json();
  if(!Array.isArray(raw)) throw new Error('candle fetch failed');
  // [time, low, high, open, close, volume]
  return raw.map(r=>({t:r[0]*1000, l:r[1], h:r[2], o:r[3], c:r[4], v:r[5]}))
            .sort((a,b)=>a.t-b.t);
}

function gridLevels(ep){
  if(!ep || ep.low==null || ep.high==null || !ep.count || ep.count<2) return [];
  const step = (ep.high-ep.low)/(ep.count-1);
  return Array.from({length:ep.count},(_,i)=>+(ep.low+i*step).toFixed(6));
}

async function loadGridChart(range){
  const host = document.getElementById('gridChart');
  if(!host) return;
  gridState.range = range || gridState.range;
  const cfg = GRANS[gridState.range];
  gridState.mode = cfg.mode;
  gridState.zoom = null;

  host.innerHTML = `<div class="loading" style="padding:60px 0;text-align:center">Loading candles…</div>`;
  try{
    if(gridState.gran !== cfg.g){
      gridState.candles = await fetchCandles(cfg.g);
      gridState.gran = cfg.g;
    }
    drawGrid();
  }catch(e){
    host.innerHTML = `<div class="err">Candles unavailable — ${e.message}</div>`;
  }
}

function drawGrid(){
  const host = document.getElementById('gridChart');
  const cfg = GRANS[gridState.range];
  const all = gridState.candles || [];
  if(!all.length){ host.innerHTML = '<div class="err">No candle data.</div>'; return; }

  const now = all[all.length-1].t;
  let t0, t1;
  if(gridState.zoom){
    [t0,t1] = gridState.zoom;
  }else if(cfg.span){
    t1 = now + cfg.g*1000;            // one blank bar of headroom
    t0 = t1 - cfg.span*3600000;
  }else{
    // Full = from first grid activity (or first candle) to now
    const marks = [...GD.trips.map(x=>x.buyT&&x.buyT.getTime()),
                   ...GD.positions.map(x=>x.buyT&&x.buyT.getTime())].filter(Boolean);
    const earliest = marks.length ? Math.min(...marks) : all[0].t;
    t0 = Math.max(all[0].t, earliest - cfg.g*1000*2);
    t1 = now + cfg.g*1000;
  }

  const vis = all.filter(c=>c.t>=t0 && c.t<=t1);
  if(!vis.length){ host.innerHTML = '<div class="err">No candles in this window. Try a wider range.</div>'; return; }

  // ---- y domain ----
  let lo = Math.min(...vis.map(c=>c.l)), hi = Math.max(...vis.map(c=>c.h));
  const curEp = GD.epochs.find(e=>!e.to) || GD.epochs[GD.epochs.length-1];

  if(gridState.mode==='grid'){
    // include grid levels of any epoch overlapping the window
    GD.epochs.forEach(ep=>{
      const a = ep.from?ep.from.getTime():-Infinity, b = ep.to?ep.to.getTime():Infinity;
      if(b>=t0 && a<=t1){ gridLevels(ep).forEach(L=>{ lo=Math.min(lo,L); hi=Math.max(hi,L); }); }
    });
  }
  const pad = (hi-lo)*0.10 || 0.005;
  lo -= pad; hi += pad;

  // ---- geometry ----
  const W = 1000, H = 420;
  const M = {l:10, r:74, t:16, b:34};
  const iw = W-M.l-M.r, ih = H-M.t-M.b;
  const X = t => M.l + ((t-t0)/(t1-t0))*iw;
  const Y = p => M.t + (1-((p-lo)/(hi-lo)))*ih;
  const bw = Math.max(1.4, Math.min(11, (iw/((t1-t0)/(cfg.g*1000)))*0.62));

  const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  let svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" id="gsvg"
    style="width:100%;height:${H}px;display:block;cursor:${gridState.zoom?'grab':'crosshair'};touch-action:none">`;

  // ---- y gridlines + labels ----
  const yTicks = 6;
  for(let i=0;i<=yTicks;i++){
    const p = lo + (hi-lo)*(i/yTicks), y = Y(p);
    svg += `<line x1="${M.l}" x2="${W-M.r}" y1="${y}" y2="${y}" stroke="#1a2029" stroke-width="1"/>
      <text x="${W-M.r+7}" y="${y+3.5}" fill="#5a6470" font-size="10" font-family="IBM Plex Mono,monospace">${p.toFixed(4)}</text>`;
  }

  // ---- x ticks ----
  const xTicks = 7;
  for(let i=0;i<=xTicks;i++){
    const t = t0 + (t1-t0)*(i/xTicks), x = X(t), d = new Date(t);
    const lab = (t1-t0) > 5*86400000
      ? d.toLocaleDateString('en-US',{month:'short',day:'numeric'})
      : d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
    svg += `<line x1="${x}" x2="${x}" y1="${M.t}" y2="${H-M.b}" stroke="#151b23" stroke-width="1"/>
      <text x="${x}" y="${H-M.b+16}" fill="#5a6470" font-size="9.5" text-anchor="middle" font-family="IBM Plex Mono,monospace">${lab}</text>`;
  }

  // ---- epoch grid levels (bounded segments) ----
  GD.epochs.forEach(ep=>{
    const a = ep.from?ep.from.getTime():t0, b = ep.to?ep.to.getTime():t1;
    if(b < t0 || a > t1) return;
    const sx = X(Math.max(a,t0)), ex = X(Math.min(b,t1));
    const isCur = !ep.to;
    const col = isCur ? '#5B8DEF' : '#3d4652';
    gridLevels(ep).forEach(L=>{
      if(L<lo||L>hi) return;
      const y = Y(L);
      svg += `<line x1="${sx}" x2="${ex}" y1="${y}" y2="${y}" stroke="${col}"
        stroke-width="${isCur?1.1:0.9}" stroke-dasharray="${isCur?'':'2 3'}" opacity="${isCur?0.55:0.4}"/>`;
      if(isCur){
        svg += `<text x="${W-M.r-4}" y="${y-4}" fill="${col}" font-size="9" text-anchor="end"
          font-family="IBM Plex Mono,monospace" opacity="0.8">${L.toFixed(4)}</text>`;
      }
    });
    // epoch boundary marker
    if(ep.from && ep.from.getTime()>t0 && ep.from.getTime()<t1 && GD.epochs.length>1){
      const bx = X(ep.from.getTime());
      svg += `<line x1="${bx}" x2="${bx}" y1="${M.t}" y2="${H-M.b}" stroke="#D9A441"
        stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
        <text x="${bx+5}" y="${M.t+12}" fill="#D9A441" font-size="9"
        font-family="IBM Plex Mono,monospace">⟳ ${esc(ep.label)}</text>`;
    }
  });

  // ---- candles ----
  vis.forEach(c=>{
    const x = X(c.t), up = c.c>=c.o;
    const col = up ? '#c7d2e0' : '#4a5666';
    const yO = Y(c.o), yC = Y(c.c);
    const top = Math.min(yO,yC), hgt = Math.max(1, Math.abs(yC-yO));
    svg += `<line x1="${x}" x2="${x}" y1="${Y(c.h)}" y2="${Y(c.l)}" stroke="${col}" stroke-width="1"/>
      <rect x="${x-bw/2}" y="${top}" width="${bw}" height="${hgt}" fill="${up?'none':col}"
        stroke="${col}" stroke-width="1"/>`;
  });

  // ---- completed round trips ----
  GD.trips.forEach(tr=>{
    if(!tr.buyT||!tr.sellT) return;
    const bt = tr.buyT.getTime(), st = tr.sellT.getTime();
    if(st < t0 || bt > t1) return;
    const bx=X(bt), by=Y(tr.buyP), sx=X(st), sy=Y(tr.sellP);
    const inView = p => p>=lo && p<=hi;
    if(inView(tr.buyP) && inView(tr.sellP)){
      svg += `<line x1="${bx}" y1="${by}" x2="${sx}" y2="${sy}" stroke="#3FB68B"
        stroke-width="1" stroke-dasharray="2 2.5" opacity="0.55"/>`;
    }
    if(inView(tr.buyP)) svg += `<circle cx="${bx}" cy="${by}" r="3.4" fill="#D9A441"
      stroke="#0E1116" stroke-width="1"/>`;
    if(inView(tr.sellP)){
      svg += `<circle cx="${sx}" cy="${sy}" r="3.4" fill="#3FB68B" stroke="#0E1116" stroke-width="1"/>
        <text x="${sx-6}" y="${sy-7}" fill="#3FB68B" font-size="9" text-anchor="end"
        font-family="IBM Plex Mono,monospace" font-weight="600">#${esc(tr.id)} +$${tr.profit.toFixed(2)}</text>`;
    }
  });

  // ---- open positions: buy dot + bounded target segment ----
  GD.positions.forEach(p=>{
    if(!p.buyT) return;
    const bt = p.buyT.getTime();
    if(bt > t1) return;
    const bx = X(Math.max(bt,t0)), by = Y(p.buyP), ty = Y(p.target);
    if(p.buyP>=lo && p.buyP<=hi){
      svg += `<circle cx="${bx}" cy="${by}" r="3.4" fill="#D9A441" stroke="#0E1116" stroke-width="1"/>`;
    }
    if(p.target>=lo && p.target<=hi){
      const ex = X(t1);
      svg += `<line x1="${bx}" y1="${ty}" x2="${ex}" y2="${ty}" stroke="#5B8DEF"
        stroke-width="1.3" stroke-dasharray="5 3" opacity="0.85"/>
        <text x="${bx+7}" y="${ty-6}" fill="#5B8DEF" font-size="9.5"
        font-family="IBM Plex Mono,monospace">to be sold @ ${p.target.toFixed(4)}</text>`;
      if(p.buyP>=lo&&p.buyP<=hi){
        svg += `<line x1="${bx}" y1="${by}" x2="${bx}" y2="${ty}" stroke="#5B8DEF"
          stroke-width="0.8" stroke-dasharray="1.5 2" opacity="0.45"/>`;
      }
    }
  });

  // ---- open buy orders (rays across full width) ----
  GD.openBuys.forEach(L=>{
    if(L<lo||L>hi) return;
    const y = Y(L);
    svg += `<line x1="${M.l}" x2="${W-M.r}" y1="${y}" y2="${y}" stroke="#D9A441"
      stroke-width="1.3" stroke-dasharray="7 4" opacity="0.9"/>
      <text x="${M.l+6}" y="${y-6}" fill="#D9A441" font-size="9.5" font-weight="600"
      font-family="IBM Plex Mono,monospace">OPEN BUY ORDER ${L.toFixed(4)}</text>
      <text x="${W-M.r-6}" y="${y-6}" fill="#D9A441" font-size="11" text-anchor="end">»</text>`;
  });

  // ---- last price ----
  const last = vis[vis.length-1];
  if(last){
    const y = Y(last.c);
    svg += `<line x1="${M.l}" x2="${W-M.r}" y1="${y}" y2="${y}" stroke="#E5643E" stroke-width="1" opacity="0.85"/>
      <rect x="${W-M.r+2}" y="${y-8}" width="${M.r-4}" height="16" fill="#E5643E" rx="2"/>
      <text x="${W-M.r+7}" y="${y+4}" fill="#0E1116" font-size="10" font-weight="700"
      font-family="IBM Plex Mono,monospace">${last.c.toFixed(4)}</text>`;
  }

  svg += `</svg>`;
  host.innerHTML = svg;
  wireGridInteraction(t0, t1, all);

  const note = document.getElementById('gridNote');
  if(note){
    note.innerHTML = `${cfg.label} from Coinbase · overlay from the sheet` +
      (gridState.zoom ? ' · <b>zoomed</b>' : '') +
      `<br><span style="opacity:.75">Markers come from confirmed Webot rows, candles from Coinbase — the two feeds can differ slightly, so a marker may sit just off the candle that triggered it.</span>`;
  }
}

function wireGridInteraction(t0, t1, all){
  const svg = document.getElementById('gsvg');
  if(!svg) return;
  const span = t1-t0;

  svg.addEventListener('wheel', e=>{
    e.preventDefault();
    const r = svg.getBoundingClientRect();
    const frac = (e.clientX-r.left)/r.width;
    const anchor = t0 + span*frac;
    const k = e.deltaY>0 ? 1.18 : 0.85;
    const ns = Math.max(GRANS[gridState.range].g*1000*6, span*k);
    let n0 = anchor-(anchor-t0)*(ns/span), n1 = n0+ns;
    const dataMin = all[0].t, dataMax = all[all.length-1].t + GRANS[gridState.range].g*1000;
    if(n0 < dataMin){ n0 = dataMin; n1 = n0+ns; }
    if(n1 > dataMax){ n1 = dataMax; n0 = n1-ns; }
    gridState.zoom = [n0,n1];
    drawGrid();
  }, {passive:false});

  let dragging=false, startX=0, s0=0, s1=0;
  svg.addEventListener('pointerdown', e=>{
    dragging=true; startX=e.clientX; s0=t0; s1=t1;
    svg.setPointerCapture(e.pointerId); svg.style.cursor='grabbing';
  });
  svg.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const r = svg.getBoundingClientRect();
    const dt = -((e.clientX-startX)/r.width)*(s1-s0);
    gridState.zoom = [s0+dt, s1+dt];
    drawGrid();
  });
  const end = e=>{ if(!dragging) return; dragging=false;
    try{svg.releasePointerCapture(e.pointerId);}catch(_){}
    svg.style.cursor='grab'; };
  svg.addEventListener('pointerup', end);
  svg.addEventListener('pointercancel', end);

  svg.addEventListener('dblclick', ()=>{ gridState.zoom=null; drawGrid(); });
}

/* ============================================================
   DERIVED METRICS
   ============================================================ */
function metrics(trips, positions, epochs){
  const realized   = trips.reduce((s,t)=>s+t.profit,0);
  const fees       = trips.reduce((s,t)=>s+t.fee,0);
  const confirmed  = trips.filter(t=>t.conf);
  const realizedC  = confirmed.reduce((s,t)=>s+t.profit,0);

  const cost = positions.reduce((s,p)=>s + p.buyP*(p.qty||0), 0);
  const unrealizedTarget = positions.reduce((s,p)=>s + (p.target-p.buyP)*(p.qty||0), 0);

  const durs = trips.filter(t=>t.buyT).map(t=>t.sellT-t.buyT);
  const medDur = durs.length ? durs.slice().sort((a,b)=>a-b)[Math.floor(durs.length/2)] : null;

  let perDay = null, span = null;
  if(trips.length > 1){
    span = (trips[trips.length-1].sellT - trips[0].sellT)/86400000;
    if(span > 0.25) perDay = realized/span;
  }

  return {realized, realizedC, fees, confirmed:confirmed.length,
          unconfirmed:trips.length-confirmed.length,
          cost, unrealizedTarget, medDur, perDay, span};
}

/* ---------- exposure ---------- */
function drawExposure(m, latest){
  const total = m.realized + m.cost;
  const pctRealized = total>0 ? (m.realized/total)*100 : 0;
  document.getElementById('expofill').style.width = Math.max(0.5,pctRealized)+'%';
  document.getElementById('expocap').innerHTML =
    `${usd(m.cost)} is currently sitting in ${m.cost>0?'unsold':'no'} positions. ` +
    `If every open position closes at its target, that adds ${usd(m.unrealizedTarget)} — ` +
    `but they only close if price comes back up to reach them.` +
    (latest && latest.hold<0 ? `<br>Webot marks those holdings at ${usd(latest.hold)} right now, which is the gap between banked profit and net.` : '') +
    (m.unconfirmed ? `<br><span class="unconf">${m.unconfirmed} trip${m.unconfirmed>1?'s are':' is'} marked unconfirmed and included in the totals above.</span>` : '');
}

/* ---------- P&L chart ---------- */
function drawPnl(trips, view){
  charts.pnl?.destroy();
  const note = document.getElementById('pnlNote');

  if(view==='cum'){
    let run = 0;
    const pts = trips.map(t=>{ run += t.profit; return {x:t.sellT, y:run}; });
    charts.pnl = new Chart(document.getElementById('pnlChart'),{
      type:'line',
      data:{labels:pts.map(p=>p.x), datasets:[{
        data:pts.map(p=>p.y), borderColor:'#3FB68B', borderWidth:1.8,
        pointRadius:0, tension:.1, stepped:false, fill:true,
        backgroundColor:(c)=>{
          const {ctx,chartArea}=c.chart; if(!chartArea) return 'transparent';
          const g=ctx.createLinearGradient(0,chartArea.top,0,chartArea.bottom);
          g.addColorStop(0,'#3FB68B33'); g.addColorStop(1,'#3FB68B00'); return g;
        }
      }]},
      options:{responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:false},tooltip:{
          backgroundColor:'#161B22',borderColor:'#232B36',borderWidth:1,
          titleColor:'#E8EAED',bodyColor:'#E8EAED',padding:10,displayColors:false,
          callbacks:{title:it=>fmtDate(pts[it[0].dataIndex].x),
                     label:it=>'Cumulative  '+usd(it.parsed.y)}}},
        scales:{
          x:{grid:{display:false},ticks:{maxTicksLimit:7,maxRotation:0,
             callback:(v,i)=>pts[i]?pts[i].x.toLocaleDateString('en-US',{month:'short',day:'numeric'}):''}},
          y:{position:'right',grid:{color:'#232B36',drawTicks:false},border:{display:false},
             ticks:{callback:v=>'$'+v.toFixed(0)}}}
      }
    });
    note.textContent = `${trips.length} trips · each step is one completed round trip`;
  }else{
    const byDay = {};
    trips.forEach(t=>{
      const k = t.sellT.toISOString().slice(0,10);
      byDay[k] = (byDay[k]||0) + t.profit;
    });
    const keys = Object.keys(byDay).sort();
    charts.pnl = new Chart(document.getElementById('pnlChart'),{
      type:'bar',
      data:{labels:keys, datasets:[{data:keys.map(k=>byDay[k]),
        backgroundColor:keys.map(k=>byDay[k]>=0?'#3FB68B88':'#E5643E88'), borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{
          backgroundColor:'#161B22',borderColor:'#232B36',borderWidth:1,
          titleColor:'#E8EAED',bodyColor:'#E8EAED',padding:10,displayColors:false,
          callbacks:{label:it=>usd(it.parsed.y)}}},
        scales:{
          x:{grid:{display:false},ticks:{maxRotation:0,
             callback:(v,i)=>new Date(keys[i]+'T00:00:00Z').toLocaleDateString('en-US',{month:'short',day:'numeric'})}},
          y:{position:'right',grid:{color:'#232B36',drawTicks:false},border:{display:false},
             ticks:{callback:v=>'$'+v.toFixed(0)}}}
      }
    });
    const avg = keys.length ? keys.reduce((s,k)=>s+byDay[k],0)/keys.length : 0;
    note.textContent = `${keys.length} active days · ${usd(avg)} average`;
  }
}

    : [['P24h','24H'],['P1W','1 WEEK'],['P1M','1 MONTH']];
  bar.innerHTML = `<div class="tabs" role="tablist" id="grangetabs">` +
    opts.map(([k,l])=>`<button class="tab" role="tab" data-r="${k}"
      aria-selected="${k===gridState.range}">${l}</button>`).join('') +
    `</div>
    <button class="tab" id="gzreset" style="background:var(--slate);border:1px solid var(--line)">RESET ZOOM</button>
    <span class="gchint">scroll to zoom · drag to pan · double-click to reset</span>`;
  bar.querySelector('#grangetabs').addEventListener('click',e=>{
    const b=e.target.closest('.tab'); if(!b) return;
    [...e.currentTarget.children].forEach(x=>x.setAttribute('aria-selected','false'));
    b.setAttribute('aria-selected','true');
    loadGridChart(b.dataset.r);
  });
  bar.querySelector('#gzreset').addEventListener('click',()=>{ gridState.zoom=null; drawGrid(); });
}

/* ---------- snapshot trend ---------- */
function drawSnap(snaps){
  charts.snap?.destroy();
  charts.snap = new Chart(document.getElementById('snapChart'),{
    type:'line',
    data:{labels:snaps.map(s=>s.t), datasets:[
      {label:'Trip profit', data:snaps.map(s=>s.arb), borderColor:'#3FB68B',
       borderWidth:1.6, pointRadius:0, tension:.15, fill:false},
      {label:'Net profit', data:snaps.map(s=>s.net), borderColor:'#5B8DEF',
       borderWidth:2, pointRadius:0, tension:.15, fill:false},
      {label:'Holdings P&L', data:snaps.map(s=>s.hold), borderColor:'#E5643E',
       borderWidth:1.2, pointRadius:0, tension:.15, borderDash:[3,3], fill:false}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{position:'top',align:'end',labels:{boxWidth:8,boxHeight:8,usePointStyle:true,
          pointStyle:'rect',padding:16,font:{size:11}}},
        tooltip:{backgroundColor:'#161B22',borderColor:'#232B36',borderWidth:1,
          titleColor:'#E8EAED',bodyColor:'#E8EAED',padding:10,
          callbacks:{title:it=>fmtDate(snaps[it[0].dataIndex].t),
                     label:it=>it.dataset.label+'  '+usd(it.parsed.y)}}},
      scales:{
        x:{grid:{display:false},ticks:{maxTicksLimit:7,maxRotation:0,
           callback:(v,i)=>snaps[i]?snaps[i].t.toLocaleDateString('en-US',{month:'short',day:'numeric'}):''}},
        y:{position:'right',grid:{color:'#232B36',drawTicks:false},border:{display:false},
           ticks:{callback:v=>'$'+v.toFixed(0)}}}
    }
  });
}

/* ---------- profit histogram ---------- */
function drawHist(trips){
  charts.hist?.destroy();
  if(!trips.length) return;
  const vals = trips.map(t=>t.profit);
  const lo = Math.min(...vals), hi = Math.max(...vals);
  const bins = 14, w = (hi-lo)/bins || 1;
  const counts = new Array(bins).fill(0);
  vals.forEach(v=>{ counts[Math.min(bins-1, Math.floor((v-lo)/w))]++; });
  charts.hist = new Chart(document.getElementById('histChart'),{
    type:'bar',
    data:{labels:counts.map((_,i)=>(lo+i*w).toFixed(2)),
      datasets:[{data:counts, backgroundColor:'#5B8DEF88', borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{
        backgroundColor:'#161B22',borderColor:'#232B36',borderWidth:1,
        titleColor:'#E8EAED',bodyColor:'#E8EAED',padding:10,displayColors:false,
        callbacks:{title:it=>'$'+it[0].label+' – $'+(parseFloat(it[0].label)+w).toFixed(2),
                   label:it=>it.parsed.y+' trip'+(it.parsed.y===1?'':'s')}}},
      scales:{
        x:{grid:{display:false},ticks:{maxTicksLimit:8,maxRotation:0,callback:(v,i)=>'$'+counts.map((_,j)=>(lo+j*w).toFixed(2))[i]}},
        y:{position:'right',grid:{color:'#232B36',drawTicks:false},border:{display:false},
           ticks:{precision:0}}}
    }
  });
}

/* ---------- level ladder ---------- */
function drawLadder(trips, positions, cur){
  const box = document.getElementById('ladder');
  const counts = {}, profit = {};
  trips.forEach(t=>{
    const k = t.buyP?.toFixed(4);
    if(!k) return;
    counts[k] = (counts[k]||0)+1;
    profit[k] = (profit[k]||0)+t.profit;
  });
  const openAt = {};
  positions.forEach(p=>{ const k=p.buyP?.toFixed(4); if(k) openAt[k]=(openAt[k]||0)+1; });

  // levels: from the current epoch if available, else observed buy prices
  let levels = [];
  if(cur && cur.low!=null && cur.high!=null && cur.count>1){
    const step = (cur.high-cur.low)/(cur.count-1);
    for(let i=0;i<cur.count;i++) levels.push(+(cur.low+i*step).toFixed(4));
  }
  Object.keys(counts).forEach(k=>{ if(!levels.includes(+k)) levels.push(+k); });
  Object.keys(openAt).forEach(k=>{ if(!levels.includes(+k)) levels.push(+k); });
  levels.sort((a,b)=>b-a);

  const maxC = Math.max(1, ...Object.values(counts));
  box.innerHTML = levels.map(L=>{
    const k = L.toFixed(4);
    const c = counts[k]||0, pf = profit[k]||0, op = openAt[k]||0;
    const inBand = cur && cur.low!=null && L>=cur.low-1e-9 && L<=cur.high+1e-9;
    return `<div class="rung">
      <div class="rungp" style="color:${inBand?'var(--paper)':'var(--mute)'}">${k}</div>
      <div class="rungbar"><div class="rungfill" style="width:${(c/maxC)*100}%"></div></div>
      <div class="rungmeta">${c?`${c} fill${c>1?'s':''} · ${usd(pf)}`:(op?`<span style="color:var(--amber)">holding</span>`:'—')}</div>
    </div>`;
  }).join('');
}

/* ---------- epochs ---------- */
function drawEpochs(trips, positions, epochs){
  const box = document.getElementById('epochlist');
  if(!epochs.length){ box.innerHTML = '<div class="loading">No epochs recorded.</div>'; return; }

  box.innerHTML = epochs.slice().reverse().map(ep=>{
    const et = trips.filter(t=>t.epoch===ep.id);
    const pnl = et.reduce((s,t)=>s+t.profit,0);
    const end = ep.to || new Date();
    const days = ep.from ? (end-ep.from)/86400000 : null;
    const perDay = days && days>0.25 ? pnl/days : null;
    const tripsDay = days && days>0.25 ? et.length/days : null;
    const width = (ep.low!=null&&ep.high!=null) ? ((ep.high-ep.low)/ep.low)*100 : null;
    return `<div class="epoch ${ep.to?'':'cur'}">
      <div>
        <div class="epochname">${ep.label}${ep.to?'':' <span class="sub">· active</span>'}</div>
        <div class="epochband">${ep.low!=null?`${px(ep.low)} – ${px(ep.high)}`:''}${width!=null?` · ${width.toFixed(1)}% wide`:''}${ep.count?` · ${ep.count} levels`:''}</div>
        <div class="epochband">${ep.from?fmtDate(ep.from):'?'} → ${ep.to?fmtDate(ep.to):'now'}</div>
      </div>
      <div class="epochm"><div class="k">Trips</div><div class="v">${et.length}</div></div>
      <div class="epochm"><div class="k">P&amp;L</div><div class="v" style="color:${pnl>=0?'var(--up)':'var(--down)'}">${usd(pnl)}</div></div>
      <div class="epochm"><div class="k">Per day</div><div class="v">${perDay!=null?usd(perDay):'—'}</div></div>
      <div class="epochm"><div class="k">Trips/day</div><div class="v">${tripsDay!=null?tripsDay.toFixed(1):'—'}</div></div>
    </div>`;
  }).join('');
}

/* ---------- open positions table ---------- */
function drawPositions(positions){
  const t = document.getElementById('postbl');
  if(!positions.length){
    t.outerHTML = '<div class="loading">No open positions — everything is closed out.</div>';
    return;
  }
  const now = Date.now();
  t.innerHTML = `<thead><tr>
      <th>Bought</th><th>Buy</th><th>Target</th><th>Qty</th><th>Held</th><th>Gain at target</th>
    </tr></thead><tbody>` +
    positions.slice().sort((a,b)=>(b.buyT||0)-(a.buyT||0)).map(p=>{
      const gain = (p.target-p.buyP)*(p.qty||0);
      return `<tr>
        <td>${p.buyT?fmtDate(p.buyT):'—'}${p.conf?'':'<span class="pill">UNCONF</span>'}</td>
        <td>${px(p.buyP)}</td>
        <td style="color:var(--wire)">${px(p.target)}</td>
        <td>${num(p.qty||0)}</td>
        <td>${p.buyT?fmtDur(now-p.buyT):'—'}</td>
        <td style="color:var(--up)">${usd(gain)}</td>
      </tr>`;
    }).join('') + '</tbody>';
}

/* ---------- trips table ---------- */
function drawTrips(trips, n){
  const t = document.getElementById('triptbl');
  const rows = trips.slice().reverse().slice(0, n===Infinity?trips.length:n);
  t.innerHTML = `<thead><tr>
      <th>#</th><th>Bought</th><th>Sold</th><th>Buy</th><th>Sell</th><th>Held</th><th>Fee</th><th>Profit</th>
    </tr></thead><tbody>` +
    rows.map(r=>`<tr>
      <td>${r.id||''}${r.conf?'':'<span class="pill">UNCONF</span>'}</td>
      <td>${r.buyT?fmtDate(r.buyT):'—'}</td>
      <td>${fmtDate(r.sellT)}</td>
      <td>${r.buyP!=null?px(r.buyP):'—'}</td>
      <td>${r.sellP!=null?px(r.sellP):'—'}</td>
      <td>${r.buyT?fmtDur(r.sellT-r.buyT):'—'}</td>
      <td style="color:var(--mute)">${r.fee?usd(r.fee):'—'}</td>
      <td style="color:${r.profit>=0?'var(--up)':'var(--down)'}">${usd(r.profit)}</td>
    </tr>`).join('') + '</tbody>';
}

main();
setInterval(main, 300000);
</script>
